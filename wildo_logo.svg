<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- outer hexagon frame -->
  <path d="M50 8 L88 28 L88 72 L50 92 L12 72 L12 28 Z" fill="none" stroke="#ff8c42" stroke-width="3" stroke-linejoin="round"/>
  <!-- inner framework web -->
  <line x1="50" y1="8" x2="50" y2="92" stroke="#ff3c7f" stroke-width="2" opacity="0.6"/>
  <line x1="12" y1="28" x2="88" y2="72" stroke="#ff3c7f" stroke-width="2" opacity="0.6"/>
  <line x1="88" y1="28" x2="12" y2="72" stroke="#ff3c7f" stroke-width="2" opacity="0.6"/>
  <!-- center hub -->
  <circle cx="50" cy="50" r="10" fill="none" stroke="#ff8c42" stroke-width="3"/>
  <!-- 4 corner nodes -->
  <circle cx="50" cy="26" r="4" fill="#ff3c7f"/>
  <circle cx="50" cy="74" r="4" fill="#ff3c7f"/>
  <circle cx="26" cy="50" r="4" fill="#ff3c7f"/>
  <circle cx="74" cy="50" r="4" fill="#ff3c7f"/>
  <!-- W letter inside hub -->
  <path d="M44 46 L47 54 L50 50 L53 54 L56 46" fill="none" stroke="#ff8c42" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
